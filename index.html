<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>quiz game</title>

    <!-- <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    /> -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="">
    <div class="container">
      <!-- ---------------------------------- start screen------------------------------------------ -->
      <div class="screen display" id="start-screen">
        <h1>Quiz Time</h1>
        <p class="text-secondary">
          Test your knowledge with these fun questions
        </p>
        <button class="btn" id="start-btn">Start Quiz</button>
      </div>

      <!-- ---------------------------------- start screen------------------------------------------ -->

      <!-- ---------------------------------- quiz screen------------------------------------------ -->

      <div class="screen vanish" id="quiz-screen">
        <div class="quiz-header">
          <h2 id="question-text"></h2>

          <div class="quiz-info text-secondary">
            <p>
              Question <span id="current-question">5</span> of
              <span id="total-questions">5</span>
            </p>
            <p>score:<span id="score">1</span></p>
          </div>
        </div>

        <div id="answers-container"></div>

        <div class="progress-bar">
          <div id="progress"></div>
        </div>
      </div>

      <!-- ---------------------------------- quiz screen------------------------------------------ -->

      <!-- ---------------------------------- result screen------------------------------------------ -->

      <div class="screen vanish" id="result-screen">
        <h2>Quiz Results</h2>

        <div class="results-info">
          <p>
            you scored <span id="final-score">0</span> out of
            <span id="max-score">0</span>
          </p>
          <h3>Goodjob!</h3>
        </div>

        <button class="btn" id="restart-btn">Restart Quiz</button>
      </div>
    </div>

    <!-- ---------------------------------- result screen------------------------------------------ -->

      crossorigin="anonymous"
    ></script> -->

    <script src="script.js"></script>
  </body>
</html>
