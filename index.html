<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>quiz game</title>

      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"

    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="">
    <div class="container">
      <div class="screen" id="start-screen">
        <h1>Quiz Time</h1>
        <p class="text-secondary">
          Test your knowledge with these fun questions
        </p>
        <button class="btn">Start Quiz</button>
      </div>

      <div class="screen" id="quiz-screen">
        <div class="quiz-header">
          <h2 class="question-text">what is the chemical symbol of gold?</h2>

          <div class="quiz-info text-secondary">
            <p>Question <span>5</span> of <span>5</span></p>
            <p>score:<span>1</span></p>
          </div>
        </div>

        <div class="quiz-answers">
          <button class="answer-btn">GO</button>
          <button class="answer-btn">Au</button>
          <button class="answer-btn">Zi</button>
          <button class="answer-btn">Fe</button>
        </div>

        <div class="progress-bar">
          <div class="progress"></div>
        </div>
      </div>
    </div>
